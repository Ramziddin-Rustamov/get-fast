version: "3.8"

services:
    app:
        build:
            context: .
        container_name: app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - laravel

    web:
        image: nginx:latest
        container_name: web
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./nginx:/etc/nginx/conf.d
        networks:
            - laravel

    db:
        image: mysql:8
        container_name: db
        environment:
            MYSQL_DATABASE: get_fast
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        networks:
            - laravel

networks:
    laravel:
